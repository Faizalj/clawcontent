# Full Video Thai — วิดีโอเต็มรูปแบบ ภาษาไทย
name: Full Video Thai
description: "วิดีโอเต็มรูปแบบ พร้อม voice clone, lipsync, captions"

# Video format
orientation: landscape       # landscape | portrait | square
resolution: 1280x720        # output resolution
video_duration: 3-4min       # target duration

# Content
content_mode: standalone     # standalone | series
language: th
script_format: 4-section     # 2-section | 4-section
script_instruction: ""       # custom prompt for agent

# Voice
tts_provider: elevenlabs     # elevenlabs | chatterbox | f5tts-thai
tts_voice_id: ""                    # ใส่ ElevenLabs voice clone ID ของคุณ

# Visual
image_style: "professional digital illustration, modern, clean, vibrant colors"
image_negative: "text, watermark, blurry, low quality"
use_lipsync: true

# Insert (images overlay on lipsync)
insert_interval: 20          # insert every N seconds
insert_duration: 5           # each insert shows N seconds

# Output
thumbnail_style: gradient    # gradient | minimal

# Compute
gpu_provider: modal          # modal | comfyui-local | comfyui-cloud
